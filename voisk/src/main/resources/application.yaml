spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: voisk
  datasource:
    mysql:
      url: ${MYSQL_URL}
      username: ${MYSQL_USERNAME}
      password: ${MYSQL_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
    postgres:
      url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/voisk_vector?sslmode=disable}
      username: ${POSTGRES_USERNAME:postgres}
      password: ${POSTGRES_PASSWORD:1234}
      driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

embed:
  server:
    url: ${EMBED_SERVER_URL:http://localhost:8000}

# 추천 패시지에 옵션(온도/사이즈 등) 텍스트 포함 여부.
# true로 바꾸고 재기동하면 embedding_source 태그가 달라져 자동으로 재임베딩된다.
embedding:
  include-options: ${EMBED_INCLUDE_OPTIONS:false}

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  server-url: http://localhost:8080
