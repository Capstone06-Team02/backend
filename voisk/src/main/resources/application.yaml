spring:
  application:
    name: voisk
  datasource:
    mysql:
      url: ${MYSQL_URL}
      username: ${MYSQL_USERNAME}
      password: ${MYSQL_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
    postgres:
      url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/voisk_vector}
      username: ${POSTGRES_USERNAME:postgres}
      password: ${POSTGRES_PASSWORD:1234}
      driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

embed:
  server:
    url: ${EMBED_SERVER_URL:http://localhost:8000}

boost:
  w-cat: 0.10
  w-price: 0.05

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  servers:
    - url: https://api.voisk.cloud
      description: Production Server
